{% extends '_base.html' %}

{% block title %}Sign in — PocketAI{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <h1>Welcome back</h1>
      <p>Sign in to continue to PocketAI</p>
    </div>

    <a class="btn btn-secondary btn-block" href="{{ url_for('auth.google_login') }}">Continue with Google</a>

    <div class="auth-divider">or</div>

    <form action="{{ url_for('auth.login') }}" method="post">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Username" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-field">
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password">
          <button type="button" class="pw-toggle" data-pw-toggle="password">Show</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-clay btn-block">Sign in</button>
    </form>

    <div class="auth-alt">No account? <a href="{{ url_for('auth.signup') }}">Meet your companion</a></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll('[data-pw-toggle]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var input = document.getElementById(btn.getAttribute('data-pw-toggle'));
      if (!input) return;
      var show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });
  });
</script>
{% endblock %}
